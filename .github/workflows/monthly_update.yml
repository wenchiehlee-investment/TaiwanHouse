name: Monthly Data Update

on:
  schedule:
    - cron: '0 0 1 * *'  # Run at 00:00 on day 1 of every month
  workflow_dispatch:      # Allow manual triggering

permissions:
  contents: write

jobs:
  update-data:
    runs-on: [self-hosted, linux]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pandas matplotlib requests selenium webdriver-manager pytz openpyxl xlrd selenium-stealth

    - name: Install Chrome
      env:
        DEBIAN_FRONTEND: noninteractive
        TMPDIR: /var/tmp
      run: |
        # Wait for any existing apt/dpkg locks to be released (up to 120s)
        echo "Checking for dpkg locks..."
        for i in $(seq 1 60); do
          if sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; then
            echo "Waiting for dpkg lock to be released (attempt $i/60)..."
            sleep 2
          else
            echo "dpkg lock is free."
            break
          fi
        done

        # Install Chrome runtime dependencies for Docker containers
        sudo -E apt-get install -f -y -o DPkg::Lock::Timeout=120 \
          libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
          libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
          libpango-1.0-0 libcairo2 libasound2 2>&1 || true

        if ! command -v google-chrome &> /dev/null; then
          echo "Chrome not found, installing..."
          wget -q -O /var/tmp/google-chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo -E dpkg -i /var/tmp/google-chrome.deb 2>&1 || true
          sudo -E apt-get install -f -y -o DPkg::Lock::Timeout=120 2>&1
          rm -f /var/tmp/google-chrome.deb
          google-chrome --version
        else
          echo "Chrome already installed: $(google-chrome --version)"
        fi

        # Verify Chrome can actually run
        google-chrome --headless --no-sandbox --disable-gpu --dump-dom about:blank 2>&1 | head -5 || echo "WARNING: Chrome headless test failed"

        sudo -E apt-get install -y -o DPkg::Lock::Timeout=120 fonts-noto-cjk fontconfig 2>/dev/null || true
        fc-cache -f -v 2>/dev/null || true

    - name: Diagnose Chrome/Selenium environment
      continue-on-error: true
      run: |
        echo "=== /dev/shm size ==="
        df -h /dev/shm 2>&1 || echo "/dev/shm not available"
        echo ""
        echo "=== Container info ==="
        cat /proc/1/cgroup 2>/dev/null | head -5 || echo "no cgroup info"
        echo "Running as: $(whoami) (uid=$(id -u))"
        echo ""
        echo "=== Chrome binary ==="
        which google-chrome
        google-chrome --version
        echo ""
        echo "=== ChromeDriver ==="
        which chromedriver 2>/dev/null && chromedriver --version 2>/dev/null || echo "chromedriver not in PATH"
        python -c "import selenium; print('selenium:', selenium.__version__)"
        echo ""
        echo "=== Quick Selenium test ==="
        python scripts/test_chrome.py

    - name: Diagnose network access to data sources
      continue-on-error: true
      run: |
        echo "=== Runner IP ==="
        RUNNER_IP=$(curl -s https://ifconfig.me)
        echo "$RUNNER_IP"

        echo ""
        echo "=== pip.moi.gov.tw (fetch_and_plot.py source) ==="
        HTTP_CODE=$(curl -s -o /tmp/resp_bare.html -w "%{http_code}" "https://pip.moi.gov.tw/Publicize/Info/E3030" 2>&1)
        echo "HTTP status: $HTTP_CODE"
        echo "Response body (first 300 chars):"
        head -c 300 /tmp/resp_bare.html
        echo ""

        echo ""
        echo "=== statis.moi.gov.tw (fetch_transaction_trend.py source) ==="
        HTTP_CODE=$(curl -s -o /tmp/resp_statis.html -w "%{http_code}" \
          "https://statis.moi.gov.tw/micst/webMain.aspx?sys=220&kind=21&type=1&funid=c0510302&cycle=2&outmode=12&utf=1&compmode=0&outkind=3&fldlst=111&codspc0=0,1&codspc1=3,1&rdm=ci&ym=11401&ymt=11401" 2>&1)
        echo "HTTP status: $HTTP_CODE"
        echo "Response body (first 300 chars — should be CSV with 建物所有權登記):"
        head -c 300 /tmp/resp_statis.html
        echo ""

    - name: Run update script (housing loan default rate)
      id: fetch_plot
      continue-on-error: true
      env:
        MPLBACKEND: Agg
        TMPDIR: /var/tmp
      run: |
        set +e
        python scripts/fetch_and_plot.py
        echo "FETCH_EXIT=$?" >> $GITHUB_ENV

    - name: Run transaction trend script
      id: transfer_monitor
      continue-on-error: true
      env:
        MPLBACKEND: Agg
      run: |
        set +e
        python scripts/fetch_transaction_trend.py
        echo "MONITOR_EXIT=$?" >> $GITHUB_ENV

    - name: Report script results
      run: |
        echo "## Script Results" >> $GITHUB_STEP_SUMMARY
        echo "fetch_and_plot.py exit code: $FETCH_EXIT"
        echo "fetch_transaction_trend.py exit code: $MONITOR_EXIT"
        if [ "$FETCH_EXIT" = "0" ]; then
          echo "- fetch_and_plot.py: ✅ Fresh data downloaded" >> $GITHUB_STEP_SUMMARY
        elif [ "$FETCH_EXIT" = "1" ]; then
          echo "- fetch_and_plot.py: ⚠️ Used cached data (download failed but plot generated)" >> $GITHUB_STEP_SUMMARY
        else
          echo "- fetch_and_plot.py: ❌ Complete failure (exit code $FETCH_EXIT)" >> $GITHUB_STEP_SUMMARY
        fi
        if [ "$MONITOR_EXIT" = "0" ]; then
          echo "- fetch_transaction_trend.py: ✅ Fresh data downloaded" >> $GITHUB_STEP_SUMMARY
        elif [ "$MONITOR_EXIT" = "1" ]; then
          echo "- fetch_transaction_trend.py: ⚠️ Used cached data (download failed but plot generated)" >> $GITHUB_STEP_SUMMARY
        else
          echo "- fetch_transaction_trend.py: ❌ Complete failure (exit code $MONITOR_EXIT)" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Commit and Push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/ scripts/ README.md
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "data: monthly update of housing visualizations"
          git push
        fi

    - name: Fail workflow if both scripts failed completely
      if: always()
      run: |
        # Exit code 0 = fresh data, 1 = used cache (OK), 2 = complete failure
        if [ "$FETCH_EXIT" -ge 2 ] && [ "$MONITOR_EXIT" -ge 2 ]; then
          echo "::error::Both data update scripts failed completely (exit codes: fetch=$FETCH_EXIT, monitor=$MONITOR_EXIT)"
          exit 1
        fi
